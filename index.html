<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="个人博客 - 记录思考与分享">
  <title>我的博客</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <nav class="nav">
        <a href="index.html" class="site-title">我的博客</a>
        <ul class="nav-links">
          <li><a href="index.html" class="active">首页</a></li>
          <li><a href="about.html">关于</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="container container-wide">
    <!-- Hero -->
    <section class="hero">
      <h1>记录思考，分享见解</h1>
      <p>关于技术、阅读与生活的个人随笔。</p>
    </section>

    <!-- Tag Filter -->
    <div class="tag-filter">
      <button class="tag-btn active" data-tag="all">全部</button>
      <button class="tag-btn" data-tag="技术">技术</button>
      <button class="tag-btn" data-tag="生活">生活</button>
      <button class="tag-btn" data-tag="阅读">阅读</button>
      <button class="tag-btn" data-tag="思考">思考</button>
    </div>

    <!-- Article List -->
    <div class="article-list" id="article-list">
      <p style="color:var(--text-muted); text-align:center; padding:40px 0;">加载中...</p>
    </div>

    <!-- Empty State -->
    <div class="no-articles" id="no-articles">
      <p>没有找到该分类下的文章</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="current-year"></span> 我的博客 · 保留所有权利</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
